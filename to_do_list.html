<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link rel="stylesheet" href="to_do_list.css">
</head>
<body>

<div class="container">
  <h1>My Tasks</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="dark-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<script src="to_do_list.js"></script>
</body>
</html>
